version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "type.deps"
      - "agent.bot"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    labels:
      - "type.deps"
      - "agent.bot"

  - package-ecosystem: gomod
    directory: /scripts/spike
    schedule:
      interval: daily
    labels:
      - "type.deps"
      - "agent.bot"
